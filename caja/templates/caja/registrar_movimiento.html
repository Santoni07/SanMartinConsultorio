{% extends 'core/base.html' %}

{% block content %}
<div class="container mt-4">

    <div class="card shadow-sm">
        <div class="card-header bg-primary text-white">
            <h4 class="mb-0">Registrar Movimiento - {{ centro_medico.nombre }}</h4>
        </div>

        <div class="card-body">
            <form method="post">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label">Tipo</label>
                    {{ form.tipo }}
                </div>

                <div class="mb-3">
                    <label class="form-label">Medio de pago</label>
                    {{ form.medio_pago }}
                </div>

                <div class="mb-3">
                    <label class="form-label">Importe</label>
                    {{ form.importe }}
                </div>

                <div class="mb-3">
                    <label class="form-label">Concepto</label>
                    {{ form.concepto }}
                </div>

                <div class="mb-3">
                    <label class="form-label">Observación</label>
                    {{ form.observacion }}
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">
                        Guardar Movimiento
                    </button>

                    <a href="{% url 'caja_home' %}" class="btn btn-secondary">
                        Cancelar
                    </a>
                </div>
            </form>
        </div>
    </div>

</div>
{% endblock %}
