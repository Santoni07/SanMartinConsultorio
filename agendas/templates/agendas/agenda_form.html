{% extends 'core/base.html' %}
{% load static %}
{% block title %}{% if form.instance.pk %}Actualizar{% else %}Crear{% endif %} Agenda{% endblock %}
{% block content %}
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <h1 class="text-center">{% if form.instance.pk %}Actualizar{% else %}Crear{% endif %} Agenda</h1>
      <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn btn-primary btn-block" type="submit">{% if form.instance.pk %}Actualizar{% else %}Crear{% endif %} Agenda</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
