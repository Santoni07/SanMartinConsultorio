{% extends 'core/base.html' %}
{% load static %}

{% block content %}
<div class="container mt-5">
    <h2 class="text-center mb-4">Consulta Médica - {{ paciente.nombre }} {{ paciente.apellido }}</h2>

    <div class="card p-4 shadow">
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}

            <div class="text-center mt-4">
                <button type="submit" class="btn btn-success">
                    <i class="bi bi-save"></i> Guardar Consulta
                </button>
                <a href="{% url 'buscar_paciente_consulta' %}" class="btn btn-secondary ms-2">
                    Cancelar
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
