{% extends 'core/base.html' %}
{% load static %}

{% block title %}Contraseña cambiada correctamente{% endblock %}

{% block content %}

<main role="main" class="py-5" style="background-color: #f8f9fa;">
  <div class="container">

    <div class="row justify-content-center">

      <div class="col-md-8 col-lg-6">

        <div class="bg-white p-4 p-md-5 shadow-sm rounded text-center">

          <h2 class="fw-bold text-success mb-3">
            Contraseña actualizada
          </h2>

          <p class="text-muted">
            Tu contraseña fue cambiada correctamente.  
            Ya podés ingresar nuevamente al sistema.
          </p>

          <div class="mt-4">
            <a href="{% url 'login' %}" class="btn btn-primary btn-lg">
              Volver al inicio de sesión
            </a>
          </div>

        </div>

      </div>

    </div>

  </div>
</main>

{% endblock %}
