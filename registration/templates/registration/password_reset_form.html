<!DOCTYPE html>
<html lang="es">
<head>

  {% load static %}

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Restablecer contraseña</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Tu CSS -->
  <link href="{% static 'core/css/style.css' %}" rel="stylesheet">

</head>

<body style="background-color: #f8f9fa;">

<main role="main" class="py-5">
  <div class="container">

    <div class="row justify-content-center">

      <div class="col-md-8 col-lg-6">

        <!-- CONTENIDO -->
        <div class="bg-white p-4 p-md-5 shadow-sm rounded">

          <div class="text-center mb-4">
            <h2 class="fw-bold text-primary">Restablecer contraseña</h2>
            <p class="text-muted mb-0">
              Ingresá tu correo electrónico y te enviaremos las instrucciones para recuperar el acceso.
            </p>
          </div>

          <form method="post">
            {% csrf_token %}

            {% if form.email.errors %}
              <div class="alert alert-danger">
                {{ form.email.errors }}
              </div>
            {% endif %}

            <!-- EMAIL -->
            <div class="mb-3">
              <label for="id_email" class="form-label fw-semibold">
                Correo electrónico
              </label>
              <input type="email"
                     name="email"
                     id="id_email"
                     class="form-control form-control-lg"
                     placeholder="ejemplo@email.com"
                     required>
            </div>

            <!-- BOTÓN -->
            <div class="d-grid">
              <button type="submit" class="btn btn-primary btn-lg">
                Enviar instrucciones
              </button>
            </div>

          </form>

          <!-- VOLVER -->
          <div class="text-center mt-4">
            <a href="{% url 'login' %}" class="text-decoration-none">
              ← Volver al inicio de sesión
            </a>
          </div>

        </div>

      </div>

    </div>

  </div>
</main>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
