<!DOCTYPE html>
<html lang="es">
<head>

  {% load static %}

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Cambio de contraseña</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Tu CSS -->
  <link href="{% static 'core/css/style.css' %}" rel="stylesheet">

</head>

<body style="background-color: #f8f9fa;">

<main role="main" class="py-5">
  <div class="container">

    <div class="row justify-content-center">

      <div class="col-md-8 col-lg-6">

        <div class="bg-white p-4 p-md-5 shadow-sm rounded">

          <!-- TÍTULO -->
          <div class="text-center mb-4">
            <h2 class="fw-bold text-primary">Cambio de contraseña</h2>
            <p class="text-muted mb-0">
              Ingresá tu contraseña actual y luego la nueva para actualizar tu acceso.
            </p>
          </div>

          <form method="post">
            {% csrf_token %}

            <!-- CONTRASEÑA ACTUAL -->
            <div class="mb-3">
              <label for="id_old_password" class="form-label fw-semibold">
                Contraseña actual
              </label>
              {{ form.old_password.errors }}
              <input type="password"
                     name="old_password"
                     id="id_old_password"
                     class="form-control form-control-lg"
                     placeholder="Ingresá tu contraseña actual"
                     required>
            </div>

            <!-- NUEVA CONTRASEÑA -->
            <div class="mb-3">
              <label for="id_new_password1" class="form-label fw-semibold">
                Nueva contraseña
              </label>
              {{ form.new_password1.errors }}
              <input type="password"
                     name="new_password1"
                     id="id_new_password1"
                     class="form-control form-control-lg"
                     placeholder="Ingresá la nueva contraseña"
                     required>
            </div>

            <!-- CONFIRMAR CONTRASEÑA -->
            <div class="mb-3">
              <label for="id_new_password2" class="form-label fw-semibold">
                Confirmar nueva contraseña
              </label>
              {{ form.new_password2.errors }}
              <input type="password"
                     name="new_password2"
                     id="id_new_password2"
                     class="form-control form-control-lg"
                     placeholder="Repetí la nueva contraseña"
                     required>
            </div>

            <!-- BOTÓN -->
            <div class="d-grid mt-4">
              <button type="submit" class="btn btn-primary btn-lg">
                Cambiar contraseña
              </button>
            </div>

          </form>

        </div>

      </div>

    </div>

  </div>
</main>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
