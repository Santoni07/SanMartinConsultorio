{% extends 'core/base.html' %}
{% load static %}

{% block title %}Iniciar sesión{% endblock %}

{% block content %}
<div class="container mt-5" style="max-width: 700px;">

    <h2 class="mb-4" style="color: #2c5c8a;">
        Iniciar sesión
    </h2>

    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-danger">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <form method="post">
        {% csrf_token %}

        <div class="mb-3">
            <input type="text"
                   name="username"
                   class="form-control"
                   placeholder="Nombre de usuario"
                   required>
        </div>

        <div class="mb-3">
            <input type="password"
                   name="password"
                   class="form-control"
                   placeholder="Contraseña"
                   required>
        </div>

        <button type="submit" class="btn btn-primary">
            Acceder
        </button>

    </form>

    <p class="mt-3">
        ¿Ha olvidado su clave?
        <a href="{% url 'password_reset' %}">Puede restaurar aquí</a>
    </p>

</div>
{% endblock %}
