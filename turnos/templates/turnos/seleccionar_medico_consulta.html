{% extends 'core/base.html' %}
{% load static %}

{% block content %}
<div class="container mt-5">

  <div class="text-center mb-4">
    <h2 class="fw-bold text-primary">
      <i class="bi bi-calendar-check"></i> Ver Disponibilidad de Médico
    </h2>
    <p class="text-muted">Seleccione especialidad y médico</p>
  </div>

  <div class="row justify-content-center">
    <div class="col-md-6">

      <div class="card shadow border-0 filtro-card">
        <div class="card-body p-4">

          <!-- 🔥 FORM -->
      <form method="post">
    {% csrf_token %}

    <div class="mb-4">
        <label class="form-label fw-bold">Especialidad</label>
        {{ form.especialidad }}
    </div>

    <div class="mb-4">
        <label class="form-label fw-bold">Médico</label>
        {{ form.medico }}
    </div>

    <button type="submit" class="btn btn-primary w-100">
        Ver Disponibilidad
    </button>
</form>

        </div>
      </div>

    </div>
  </div>

</div>

<style>
.filtro-card {
  border-left: 6px solid #0d6efd;
  transition: all 0.25s ease;
}
.filtro-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 12px 25px rgba(0,0,0,0.12);
}
</style>

<!-- 🔥 FILTRO DINÁMICO -->
<script>
document.getElementById("id_especialidad").addEventListener("change", function () {
    this.form.submit();
});
</script>

{% endblock %}
